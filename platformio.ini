; PlatformIO Project Configuration File
;
; STM32F411CEU6 — USB CDC + DFU upload
; USB CDC enumerates as /dev/cu.usbmodem... on macOS (VID=0x0483 PID=0x5740)
;
; https://docs.platformio.org/page/projectconf.html

[env:genericSTM32F411CE]
platform  = ststm32
board     = genericSTM32F411CE
framework = stm32cube

; ---- Upload via DFU (keep existing method) ----
upload_protocol = dfu

; ---- Serial monitor: USB CDC port at 115200 ----
monitor_speed = 115200
; monitor_port is auto-detected; uncomment and set if PIO picks wrong port:
; monitor_port = /dev/cu.usbmodem1234

; ---- Build flags ----
build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32F411xE
    -DUSE_USB_FS
    -DHSE_VALUE=25000000
    -DHSI_VALUE=16000000

; ---- Pre-build script: injects USB middleware sources + include paths ----
extra_scripts = pre:usb_sources.py